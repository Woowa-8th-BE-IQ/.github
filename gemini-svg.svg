<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0D1117"/>
  
  <style>
    /* 3D 회전 애니메이션 */
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    
    /* 특이점으로 빨려 들어가는 왜곡 애니메이션 */
    @keyframes fall {
      0% { transform: scale(1.2) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      80% { opacity: 0.8; }
      100% { transform: scale(0.1) rotate(180deg); opacity: 0; }
    }

    /* 사건의 지평선 펄스 효과 */
    @keyframes horizon-glow {
      0%, 100% { filter: drop-shadow(0 0 10px #00bfa5); }
      50% { filter: drop-shadow(0 0 25px #00bfa5); }
    }

    /* 고리 날아감 방지: 정확한 절대 좌표(0px 0px)를 축으로 고정 */
    .spacetime-grid {
      transform-origin: 0px 0px; 
      animation: spin 35s linear infinite;
    }
    
    .data-stream {
      transform-origin: 0px 0px;
      animation: fall 5s cubic-bezier(0.5, 0, 1, 0.5) infinite;
    }

    /* 애니메이션 딜레이 분산 */
    .delay-1 { animation-delay: -1.25s; }
    .delay-2 { animation-delay: -2.5s; }
    .delay-3 { animation-delay: -3.75s; }
  </style>

  <g transform="translate(400, 200)">
    
    <g transform="scale(1, 0.35)">
      
      <g class="spacetime-grid">
        
        <circle cx="0" cy="0" r="100" fill="none" stroke="#00bfa5" stroke-width="5" opacity="0.8"/>
        <circle cx="0" cy="0" r="160" fill="none" stroke="#00bfa5" stroke-width="3" opacity="0.5"/>
        <circle cx="0" cy="0" r="240" fill="none" stroke="#00bfa5" stroke-width="1.5" opacity="0.3"/>
        <circle cx="0" cy="0" r="340" fill="none" stroke="#00bfa5" stroke-width="0.8" opacity="0.2"/>
        <circle cx="0" cy="0" r="480" fill="none" stroke="#00bfa5" stroke-width="0.3" opacity="0.1"/>

        <line x1="0" y1="-500" x2="0" y2="-100" stroke="#00bfa5" stroke-width="1.5" opacity="0.3"/>
        <line x1="0" y1="100" x2="0" y2="500" stroke="#00bfa5" stroke-width="1.5" opacity="0.3"/>
        <line x1="-500" y1="0" x2="-100" y2="0" stroke="#00bfa5" stroke-width="1.5" opacity="0.3"/>
        <line x1="100" y1="0" x2="500" y2="0" stroke="#00bfa5" stroke-width="1.5" opacity="0.3"/>
        <line x1="-350" y1="-350" x2="-70" y2="-70" stroke="#00bfa5" stroke-width="1" opacity="0.2"/>
        <line x1="350" y1="350" x2="70" y2="70" stroke="#00bfa5" stroke-width="1" opacity="0.2"/>
        <line x1="-350" y1="350" x2="-70" y2="70" stroke="#00bfa5" stroke-width="1" opacity="0.2"/>
        <line x1="350" y1="-350" x2="70" y2="-70" stroke="#00bfa5" stroke-width="1" opacity="0.2"/>
        
        <path class="data-stream" d="M 0 -340 A 340 340 0 0 1 340 0" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8"/>
        <path class="data-stream delay-1" d="M 340 0 A 340 340 0 0 1 0 340" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8"/>
        <path class="data-stream delay-2" d="M 0 340 A 340 340 0 0 1 -340 0" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8"/>
        <path class="data-stream delay-3" d="M -340 0 A 340 340 0 0 1 0 -340" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8"/>
      </g>
    </g>

    <circle cx="0" cy="0" r="50" fill="#000000" stroke="#00bfa5" stroke-width="3" style="animation: horizon-glow 4s infinite alternate;"/>
    
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="16" fill="#00bfa5" font-weight="bold" letter-spacing="2">IQ</text>
  </g>
</svg>
